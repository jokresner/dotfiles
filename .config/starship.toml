[nix_shell]
style       = "bold italic fg:blue"
symbol      = "пҢ“ "
format      = "[$symbol nixвҺӘ$stateвҺӘ]($style) [$name](italic fg:overlay1)"
impure_msg  = "[вҢҪ](bold fg:red)"
