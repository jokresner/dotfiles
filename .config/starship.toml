"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_mocha"
add_newline = false
continuation_prompt = "[в–ёв–№ ](fg:overlay1)"

format = """($nix_shell$container$fill$git_metrics\n)$cmd_duration\
$hostname\
$localip\
$shlvl\
$shell\
$env_var\
$jobs\
$sudo\
$username\
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$git_branch\
$git_commit\
$git_state\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cpp\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$vlang\
$vagrant\
$zig\
$buf\
$conda\
$pixi\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$crystal\
$custom\
$line_break$character"""

right_format = """
$status\
$os\
$battery\
$time"""

[fill]
symbol = ' '

[character]
format = "$symbol "
success_symbol = "[вқҜ](bold fg:green)"
error_symbol   = "[вқҜ](bold fg:red)"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style  = "italic fg:green"

[sudo]
format = "[$symbol]($style)"
style  = "bold italic fg:mauve"
symbol = "вӢҲв”Ҳ"
disabled = false

[username]
style_user = "bold italic fg:yellow"
style_root = "bold italic fg:mauve"
format = "[вӯҳ $user]($style) "
disabled = false
show_always = false

[directory]
home_symbol        = "вҢӮ"
truncation_length  = 2
truncation_symbol  = "в–Ў "
read_only          = " у°Ңҫ"
use_os_path_sep    = true
style              = "italic fg:blue"
format             = '[$path]($style)[$read_only]($read_only_style)'
repo_root_style    = "bold fg:blue"
repo_root_format   = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [в–і](bold fg:blue)'

[cmd_duration]
format = "[в—„ $duration ](italic fg:text)"

[jobs]
format = "[$symbol$number]($style) "
style  = "fg:text"
symbol = "[в–¶](italic fg:blue)"

[localip]
ssh_only = true
format   = " в—Ҝ[$localipv4](bold fg:pink)"
disabled = false

[time]
disabled        = false
format          = "[ $time]($style)"
time_format     = "%R"
utc_time_offset = "local"
style           = "italic fg:overlay1"

[battery]
format            = "[ $percentage $symbol]($style)"
full_symbol       = "в–Ҳ"
charging_symbol   = "[вҶ‘](italic bold fg:green)"
discharging_symbol= "вҶ“"
unknown_symbol    = "в–‘"
empty_symbol      = "в–ғ"

[[battery.display]]
threshold = 20
style     = "italic bold fg:red"

[[battery.display]]
threshold = 60
style     = "italic fg:mauve"

[[battery.display]]
threshold = 70
style     = "italic fg:yellow"

[git_branch]
format             = " [$branch(:$remote_branch)]($style)"
symbol             = "пҗҳ "
style              = "italic fg:blue"
truncation_symbol  = "вӢҜ"
truncation_length  = 11
ignore_branches    = ["main", "master"]
only_attached      = true

[git_commit]
tag_symbol = " пҗ’ "

[git_metrics]
format        = '([в–ҙ$added]($added_style))([в–ҝ$deleted]($deleted_style))'
added_style   = 'italic fg:green'
deleted_style = 'italic fg:red'
ignore_submodules = true
disabled      = false

[git_status]
style   = "bold italic fg:blue"
format  = "([вҺӘ$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashedвҺҘ]($style))"
conflicted = "[вҡЎ$count](fg:mauve)"
ahead      = "[вҶ‘$count](fg:green)"
behind     = "[вҶ“$count](fg:red)"
diverged   = "[вҶ• $ahead_count/$behind_count](fg:mauve)"
untracked  = "[?$count](fg:yellow)"
stashed    = "[рҹ“Ұ$count](fg:text)"
modified   = "[!$count](fg:yellow)"
staged     = "[+$count](fg:teal)"
renamed    = "[вҶ’$count](fg:blue)"
deleted    = "[вң—$count](fg:red)"

# Languages / tools (Jetpack formats, Catppuccin styles) with Nerd Font symbols

[deno]
format = " [deno](italic) [вҲ« $version](bold fg:green)"
version_format = "${raw}"
symbol = "оҹҖ "

[lua]
format = " [lua](italic) [${symbol}${version}]($style)"
version_format = "${raw}"
symbol = "оҳ  "
style  = "bold fg:yellow"

[nodejs]
format = " [node](italic) [в—« ($version)](bold fg:green)"
version_format = "${raw}"
detect_files     = ["package-lock.json", "yarn.lock"]
detect_folders   = ["node_modules"]
detect_extensions= []
symbol = "оңҳ "

[python]
format = " [py](italic) [${symbol}${version}]($style)"
symbol = "оҲө "
version_format = "${raw}"
style  = "bold fg:yellow"

[ruby]
format = " [rb](italic) [${symbol}${version}]($style)"
symbol = "оһ‘ "
version_format = "${raw}"
style  = "bold fg:red"

[rust]
format = " [rs](italic) [$symbol$version]($style)"
symbol = "уұҳ— "
version_format = "${raw}"
style  = "bold fg:red"

[package]
format = " [pkg](italic fg:overlay1) [$symbol$version]($style)"
version_format = "${raw}"
symbol = "у°Ҹ— "
style  = "italic bold fg:yellow"

[swift]
format = " [sw](italic) [${symbol}${version}]($style)"
symbol = "оқ• "
style  = "bold fg:red"
version_format = "${raw}"

[aws]
disabled = true
format = " [aws](italic) [$symbol $profile $region]($style)"
style  = "bold fg:blue"
symbol = "оҢҪ  "

[buf]
symbol = "п’қ "
format = " [buf](italic) [$symbol $version $buf_version]($style)"

[c]
symbol = "оҳһ "
format = " [$symbol($version(-$name))]($style)"

[cpp]
symbol = "оҳқ "
format = " [$symbol($version(-$name))]($style)"

[conda]
symbol = "п„Ң "
format = " conda [$symbol$environment]($style)"

[pixi]
symbol = "у°Ҹ— "
format = " pixi [$symbol$version ($environment )]($style)"

[dart]
symbol = "оһҳ "
format = " dart [$symbol($version )]($style)"

[docker_context]
symbol = "пҢҲ "
format = " docker [$symbol$context]($style)"

[elixir]
symbol = "оҳӯ "
format = " exs [$symbol $version OTP $otp_version ]($style)"

[elm]
symbol = "оҳ¬ "
format = " elm [$symbol($version )]($style)"

[golang]
