wtf:
  colors:
    checked: "gray"
    highlight:
      fore: "black"
      back: "green"
    text: "white"
    title: "white"
  refreshInterval: 1
  exitMessage:
    display: true
  grid:
    columns: [35, 35, 35, 35, 35, 35]
    rows: [10, 10, 10, 10, 10, 3, 4]
  navigation:
    shortcuts: true
  openFileUtil: "open"
  openUrlUtil:
    - "tmux"
    - "new-window"
    - "elinks"
  sigils:
    checkbox:
      checked: "x"
      unchecked: " "
    paging:
      normal: "*"
      selected: "_"
  term: "xterm-256color"
  mods:
    digitalclock:
      withDatePrefix: true
      dateFormat: "Monday 02 Jan 2006"
      color: teal
      enabled: true
      font: bigfont
      hourFormat: 24
      position:
        top: 0
        left: 1
        height: 1
        width: 1
      refreshInterval: 1s
      title: "Clock"
      type: "digitalclock"

    docker:
      type: docker
      enabled: true
      labelColor: lightblue
      position:
        top: 0
        left: 0
        height: 2
        width: 1
      refreshInterval: 1s

    hackernews:
      enabled: true
      numberOfStories: 10
      position:
        top: 2
        left: 0
        height: 1
        width: 2
      storyType: top
      refreshInterval: 15m

    ipinfo:
      colors:
        name: red
        value: white
      enabled: true
      position:
        top: 1
        left: 1
        height: 1
        width: 1
      refreshInterval: 150s

    lunarphase:
      enabled: true
      position:
        top: 0
        left: 2
        height: 2
        width: 2
      language: "de"
      refreshInterval: 5h

    urlcheck:
      enabled: true
      timeout: 60
      urls:
        - https://git.jokresner.de
        - https://cloud.jokresner.de
        - https://home.jokresner.de
      position:
        top: 2
        left: 2
        height: 1
        width: 1
      refreshInterval: 30

    prettyweather:
      enabled: true
      city: "Leipzig"
      position:
        top: 2
        left: 3
        height: 1
        width: 1
      refreshInterval: 5m
      unit: "m"
      view: 0
      language: "de"
