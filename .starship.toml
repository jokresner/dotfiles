# Don't print a new line at the start of the prompt
add_newline = false

# Pipes в•°в”Җ в•ӯв”Җ
# Powerline symbols В оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮ» оӮј оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ  оғҢ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ” оғ’ 
# Wedges рҹӯ§рҹӯ’ рҹӯЈрҹӯ§рҹӯ“
# Random noise рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—

format = """
$cmd_duration$directory $git_branch
$character
"""

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[вҖўп‘„ пӮ©](bold fg:green) "
error_symbol = "[вҖўп‘„ у°…ҷ](bold fg:red) "

[git_branch]
style = "bg:green"
symbol = "у°ҳ¬"
truncation_length = 4
truncation_symbol = ""
format = "вҖў [оӮ¶](bold fg:green)[$symbol $branch(:$remote_branch)](fg:black bg:green)[оӮҙ ](bold fg:green)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[line_break]
disabled = false

[directory]
home_symbol = " п‘ӯ "
read_only = " п‘– "
style = "bg:green fg:black"
truncation_length = 6
truncation_symbol = "вҖўвҖў/"
format = '[оӮ¶](bold fg:green)[$path ]($style)[оӮҙ](bold fg:green)'


[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:yellow)[оӯұ $duration](bold bg:yellow fg:black)[оӮҙ](bold fg:yellow) вҖўвҖў '

